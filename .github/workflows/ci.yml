name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  supply-chain-guard:
    name: Supply-chain guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: No Terraform plan/state artifacts committed
        run: |
          matches="$(git ls-files | grep -iE '(^|/)tfplan([-.]|$)|\.tfplan$|\.tfstate($|\.)' || true)"
          if [ -n "$matches" ]; then
            echo "::error::Terraform plan/state artifacts are tracked in git (may leak secrets); remove them and add to .gitignore:"
            echo "$matches"
            exit 1
          fi
          echo "No Terraform plan/state artifacts tracked."

  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./internal/...

      - name: Test coverage
        run: |
          go test -race -coverprofile=coverage.out ./internal/...
          go tool cover -func=coverage.out | tail -1

  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@db9de0fc1a667e1a49d2291a1a042dff081d78f6 # v9.3.0
        with:
          version: v2.12.2

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  terraform-checks:
    name: Terraform checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.13"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate each stack
        # The split topology has three independent roots (registry, gateway,
        # demo) rather than one root under infra/, so init + validate run per
        # stack.
        run: |
          for stack in registry gateway demo; do
            echo "== validating infra/$stack =="
            terraform -chdir="$stack" init -backend=false
            terraform -chdir="$stack" validate
          done

      - name: Test gateway stack
        # Run the gateway's offline security-hardening tests (mock_provider,
        # no AWS creds needed). The gateway is the only stack with a tests/ dir.
        run: terraform -chdir=gateway test

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

  ash-scan:
    name: ASH security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to GitHub code scanning
      actions: read # required by codeql-action/upload-sarif on private repos
      # (resolves the workflow run via the Actions API; without it the upload
      # fails with "Resource not accessible by integration").
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Full history so ASH's gitleaks scanner can inspect past commits.
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install ASH
        # Pinned to the same release the previous GitLab pipeline used, for scan
        # parity. Bump deliberately rather than tracking the mutable @v3 float.
        run: pip install "git+https://github.com/awslabs/automated-security-helper.git@v3.5.7"

      - name: Run ASH scan
        # Local mode needs only Python 3.10+ (no container runtime). Honors the
        # severity_threshold and suppressions in .ash.yml, and exits non-zero on
        # findings at/above threshold so the job fails closed — matching the old
        # GitLab job's `allow_failure: false`.
        run: ash --mode local

      - name: Upload SARIF to GitHub code scanning
        # Runs even when the scan fails so findings still surface in the Security
        # tab. Uses ASH's GHAS-optimized SARIF (correct severity labels, smaller
        # payload), generated by default at this path. Skipped for fork PRs,
        # whose read-only token cannot write code-scanning results.
        if: always() && github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          sarif_file: .ash/ash_output/reports/ash.ghas.sarif
          category: ash-security-scan

      - name: Upload ASH report bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ash-results
          path: .ash/ash_output/
          if-no-files-found: warn

  demo-app-build:
    name: Demo apps build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [test-sp, test-rp]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: scripts/${{ matrix.app }}/go.mod

      - name: Build
        working-directory: scripts/${{ matrix.app }}
        run: go build -o /dev/null .
